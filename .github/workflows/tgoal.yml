name: tgoal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: Install Chrome dependencies (FIXED)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libgtk-3-0 \
            libx11-xcb1 \
            libx11-6 \
            libxcb1 \
            libdrm2 \
            libxext6 \
            libxfixes3 \
            ca-certificates \
            fonts-liberation \
            xdg-utils \
            wget

      - name: 🚀 Run scraper
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: node tgoal.js

      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add tgoal.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 auto update playlist"
            git push
          fi
