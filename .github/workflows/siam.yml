name: Siam

on:
  schedule:
    - cron: "0 23 * * *" # รันทุกวัน 06:00 ไทย
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install deps
        run: npm install

      - name: ▶️ Run script
        run: node siam.js

      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add playlist_siam.json
          git commit -m "update playlist" || echo "no changes"
          git push
